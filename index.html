<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>360° Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F5F2EC;
      --dark:  #1A1916;
      --gold:  #C8A96E;
      --glass: rgba(26,25,22,0.55);
    }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: 'DM Sans', sans-serif;
      color: var(--cream);
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }
    canvas { display: block; }
    #loading {
      position: fixed; inset: 0; z-index: 100;
      background: var(--dark);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 28px;
      transition: opacity 0.8s, visibility 0.8s;
    }
    #loading.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: clamp(1.4rem,5vw,2rem);
      letter-spacing: 0.35em; text-transform: uppercase;
    }
    .logo span { color: var(--gold); }
    .bar-wrap {
      width: min(260px,60vw); height: 1px;
      background: rgba(255,255,255,0.1); position: relative; overflow: hidden;
    }
    .bar {
      position: absolute; left: -100%; top: 0; bottom: 0; width: 100%;
      background: linear-gradient(90deg,transparent,var(--gold),transparent);
      animation: shimmer 1.6s ease-in-out infinite;
    }
    @keyframes shimmer { from{left:-100%} to{left:100%} }
    .bar-label {
      font-size: 0.65rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(245,242,236,0.4);
    }
    #ui { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
    .top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      padding: max(env(safe-area-inset-top,0px),16px) 20px 20px;
      display: flex; align-items: center; justify-content: space-between;
      background: linear-gradient(to bottom, rgba(26,25,22,0.7), transparent);
    }
    .project-label {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300; font-size: clamp(0.95rem,3.5vw,1.25rem);
      letter-spacing: 0.2em; text-transform: uppercase;
    }
    .project-label small {
      display: block; font-family: 'DM Sans', sans-serif;
      font-size: 0.6rem; letter-spacing: 0.25em;
      color: var(--gold); margin-top: 4px;
    }
    .controls { display: flex; gap: 10px; pointer-events: all; }
    .btn {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--glass); border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color: var(--cream); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s, transform .15s;
      -webkit-user-select: none; user-select: none;
    }
    .btn:active { transform: scale(0.93); }
    .btn.active { background: rgba(200,169,110,0.25); border-color: var(--gold); }
    .btn svg { width: 20px; height: 20px; }
    .hint {
      position: absolute;
      bottom: max(env(safe-area-inset-bottom,0px),20px);
      left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 8px;
      background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 100px; padding: 8px 18px;
      font-size: 0.65rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: rgba(245,242,236,0.5);
      white-space: nowrap; animation: fadeUp 1s 2.5s both;
    }
    .hint svg { width: 14px; height: 14px; opacity: 0.5; }
    @keyframes fadeUp {
      from { opacity:0; transform: translateX(-50%) translateY(10px); }
      to   { opacity:1; transform: translateX(-50%) translateY(0); }
    }
    #toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      z-index: 200; background: var(--glass);
      border: 1px solid rgba(200,169,110,0.4);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-radius: 12px; padding: 14px 22px;
      font-size: 0.75rem; letter-spacing: 0.1em;
      color: var(--cream); text-align: center; max-width: 280px;
      opacity: 0; pointer-events: none;
      transition: opacity .3s, transform .3s;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: all; }
    #toast p { margin-bottom: 10px; line-height: 1.5; }
    #toast button {
      background: var(--gold); color: var(--dark);
      border: none; padding: 7px 20px; border-radius: 6px;
      font-size: 0.75rem; font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.1em; cursor: pointer;
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="logo">360<span>°</span> Render</div>
  <div class="bar-wrap"><div class="bar"></div></div>
  <div class="bar-label" id="bar-label">Cargando panorama</div>
</div>

<div id="ui">
  <div class="top-bar">
    <div class="project-label" id="proj-label">Vista 360°<small>Render Arquitectónico</small></div>
    <div class="controls">
      <button class="btn" id="btn-gyro" title="Giroscopio">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="12" rx="10" ry="4"/>
          <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(60 12 12)"/>
          <ellipse cx="12" cy="12" rx="10" ry="4" transform="rotate(120 12 12)"/>
          <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <button class="btn" id="btn-fs" title="Pantalla completa">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 11V6a2 2 0 0 0-4 0v5M14 10V4a2 2 0 0 0-4 0v6M10 10.5a2 2 0 0 0-4 0V17a6 6 0 0 0 12 0v-5a2 2 0 0 0-4 0"/>
    </svg>
    Arrastra para explorar
  </div>
</div>

<div id="toast">
  <p>Se requiere permiso para acceder al giroscopio.</p>
  <button id="btn-permit">Permitir acceso</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
<script>
// ══════════════════════════════════════════════
// 👇 REEMPLAZA ESTA URL CON TU IMAGEN
const IMAGE_URL    = "https://res.cloudinary.com/di3pyc5ws/image/upload/v1780000087/Panorama_1_jxwt9u.png";
const PROJECT_NAME = "Vista 360°";
const PROJECT_DESC = "Render Arquitectónico";
// ══════════════════════════════════════════════

document.getElementById('proj-label').innerHTML =
  PROJECT_NAME + '<small>' + PROJECT_DESC + '</small>';

// ── Renderer ───────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1000);

// Esfera invertida 360
const geo    = new THREE.SphereGeometry(500, 60, 40);
geo.scale(-1, 1, 1);
const mat    = new THREE.MeshBasicMaterial({ color: 0xffffff });
const sphere = new THREE.Mesh(geo, mat);
scene.add(sphere);

// Cargar textura
new THREE.TextureLoader().load(
  IMAGE_URL,
  (tex) => {
    tex.encoding  = THREE.sRGBEncoding;
    tex.minFilter = THREE.LinearFilter;
    mat.map = tex;
    mat.needsUpdate = true;
    document.getElementById('loading').classList.add('hidden');
  },
  undefined,
  () => { document.getElementById('bar-label').textContent = 'Error al cargar imagen'; }
);

// ── Navegación táctil / mouse ──────────────────
let isDragging = false, prevX = 0, prevY = 0;
let lon = 0, lat = 0, lonT = 0, latT = 0;
let autoRotate = true, autoTimer;

function stopAuto() {
  autoRotate = false;
  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => autoRotate = true, 4000);
}

const el = renderer.domElement;
el.addEventListener('touchstart',  e => { if(e.touches.length===1){ isDragging=true; prevX=e.touches[0].clientX; prevY=e.touches[0].clientY; stopAuto(); }}, {passive:true});
el.addEventListener('touchmove',   e => { if(!isDragging||e.touches.length!==1) return; lonT-=(e.touches[0].clientX-prevX)*0.3; latT+=(e.touches[0].clientY-prevY)*0.3; prevX=e.touches[0].clientX; prevY=e.touches[0].clientY; }, {passive:true});
el.addEventListener('touchend',    () => isDragging=false);
el.addEventListener('mousedown',   e => { isDragging=true; prevX=e.clientX; prevY=e.clientY; stopAuto(); });
el.addEventListener('mousemove',   e => { if(!isDragging) return; lonT-=(e.clientX-prevX)*0.3; latT+=(e.clientY-prevY)*0.3; prevX=e.clientX; prevY=e.clientY; });
el.addEventListener('mouseup',     () => isDragging=false);
el.addEventListener('mouseleave',  () => isDragging=false);

// Zoom pinch
let lastPinch = 0;
el.addEventListener('touchstart', e => { if(e.touches.length===2) lastPinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); }, {passive:true});
el.addEventListener('touchmove',  e => { if(e.touches.length!==2) return; const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); camera.fov=Math.max(30,Math.min(100,camera.fov-(d-lastPinch)*0.1)); camera.updateProjectionMatrix(); lastPinch=d; }, {passive:true});
el.addEventListener('wheel',      e => { camera.fov=Math.max(30,Math.min(100,camera.fov+e.deltaY*0.05)); camera.updateProjectionMatrix(); }, {passive:true});

// ── Giroscopio ─────────────────────────────────
let gyroOn=false, dA=0, dB=90, dG=0;
window.addEventListener('deviceorientation', e => { if(gyroOn){ dA=e.alpha||0; dB=e.beta||90; dG=e.gamma||0; }});

const btnG=document.getElementById('btn-gyro'), toast=document.getElementById('toast');
btnG.addEventListener('click', () => {
  if(gyroOn){ gyroOn=false; btnG.classList.remove('active'); return; }
  if(typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function'){
    toast.classList.add('show');
  } else { gyroOn=true; btnG.classList.add('active'); }
});
document.getElementById('btn-permit').addEventListener('click', () => {
  DeviceOrientationEvent.requestPermission().then(s=>{ toast.classList.remove('show'); if(s==='granted'){ gyroOn=true; btnG.classList.add('active'); }}).catch(()=>toast.classList.remove('show'));
});
document.addEventListener('touchstart', e=>{ if(!toast.contains(e.target)&&e.target!==btnG) toast.classList.remove('show'); },{passive:true});

// ── Fullscreen ─────────────────────────────────
document.getElementById('btn-fs').addEventListener('click', () => {
  const d=document.documentElement, b=document.getElementById('btn-fs');
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    (d.requestFullscreen||d.webkitRequestFullscreen||function(){}).call(d); b.classList.add('active');
  } else { (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document); b.classList.remove('active'); }
});

// ── Resize ─────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ── Loop ───────────────────────────────────────
const euler=new THREE.Euler(), q=new THREE.Quaternion();
(function animate(){
  requestAnimationFrame(animate);
  if(gyroOn){
    euler.set(THREE.MathUtils.degToRad(dB-90), THREE.MathUtils.degToRad(dA), THREE.MathUtils.degToRad(-dG),'YXZ');
    q.setFromEuler(euler);
    camera.quaternion.slerp(q,0.1);
  } else {
    if(autoRotate&&!isDragging) lonT+=0.03;
    lon+=(lonT-lon)*0.08; lat+=(latT-lat)*0.08;
    lat=Math.max(-85,Math.min(85,lat));
    const phi=THREE.MathUtils.degToRad(90-lat), theta=THREE.MathUtils.degToRad(lon);
    camera.lookAt(Math.sin(phi)*Math.cos(theta), Math.cos(phi), Math.sin(phi)*Math.sin(theta));
  }
  renderer.render(scene,camera);
})();
</script>
</body>
</html>
